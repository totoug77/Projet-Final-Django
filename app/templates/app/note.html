{% extends 'base.html' %}

{% block content %}
<div class="content-wrapper">
    <div class="container-fluid pt-4">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Ma Liste de Notes</h3>
            </div>
            <div class="card-body">
                <form method="POST" class="mb-4">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="designation" class="form-control" placeholder="Ajouter une note..." required>
                        <button type="submit" class="btn btn-primary">Ajouter</button>
                    </div>
                </form>

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Note</th>
                            <th style="width: 180px">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for n in notes %}
                        <tr>
                            <td>{{ n.designation }}</td>
                            <td>
                                <!-- Bouton Modifier ajouté ici -->
                                <a href="{% url 'update_note' n.id %}" class="btn btn-warning btn-sm">Modifier</a>
                                
                                <!-- Bouton Supprimer existant -->
                                <a href="{% url 'delete_note' n.id %}" class="btn btn-danger btn-sm">Supprimer</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
