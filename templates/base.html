{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>{% block title %} {% endblock title %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{% static './css/adminlte.css' %}" />
  </head>

  <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
    <div class="app-wrapper">
      <!--begin::Header-->
      <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button"><i class="bi bi-list"></i></a>
            </li>
            <li class="nav-item d-none d-md-block"><a href="{% url 'home' %}" class="nav-link">Home</a></li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item dropdown user-menu">
              <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                <img src="{% static './assets/img/user2-160x160.jpg' %}" class="user-image rounded-circle shadow" alt="User Image"/>
                <span class="d-none d-md-inline">{{ user.username }}</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end">
                <li class="user-header text-bg-primary">
                  <p>{{ user.username }} - Utilisateur</p>
                </li>
                <li class="user-footer">
                  <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-default btn-flat float-end">Déconnexion</button>
                  </form>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </nav>
      <!--end::Header-->

      <!--begin::Sidebar-->
      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
          <a href="{% url 'home' %}" class="brand-link"><span class="brand-text fw-light">AdminLTE 4</span></a>
        </div>
        <div class="sidebar-wrapper">
          <nav class="mt-2">
            <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="navigation">
              
              <li class="nav-item">
                <a href="{% url 'home' %}" class="nav-link">
                  <i class="nav-icon bi bi-house"></i>
                  <p>Accueil</p>
                </a>
              </li>

              <li class="nav-item">
                <a href="{% url 'note' %}" class="nav-link">
                  <i class="nav-icon bi bi-list-check"></i>
                  <p>Liste des notes</p>
                </a>
              </li>

              <!-- Déconnexion dans la sidebar -->
              <li class="nav-item mt-5">
                <form action="{% url 'logout' %}" method="post" id="logout-sidebar">
                    {% csrf_token %}
                    <a href="#" onclick="document.getElementById('logout-sidebar').submit();" class="nav-link text-danger">
                        <i class="nav-icon bi bi-box-arrow-right"></i>
                        <p>Déconnexion</p>
                    </a>
                </form>
              </li>
              
            </ul>
          </nav>
        </div>
      </aside>
      <!--end::Sidebar-->
      
      <main class="app-main">
        <div class="container-fluid p-4">
            {% block content %} 
            {% endblock content %}
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
    <script src="{% static './js/adminlte.js' %}"></script>
  </body>
</html>
